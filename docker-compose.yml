services:

  backend:
    build: ./backend
    ports:
      - "3000:3000"
    depends_on:
      bd:
        condition: service_healthy
    environment:
      NODE_ENV: production      
      APP_PORT: 3000
      BD_NOMBRE: test
      BD_USER: root
      BD_PWD: 123
      BD_HOST: bd
      BD_PORT: 3306
    restart: unless-stopped

  frontend:
    build:
      context:  ./frontend
      args:
        API_URL: http://backend:3000
    ports:
      - "8000:80"
    depends_on:
      - backend

    restart: unless-stopped

  bd:
    container_name: some-mysql
    image: mysql:8.0
    ports:
      - "33306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: 123
    volumes:
      - ./db/data:/var/lib/mysql
      - ./db/sql:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p123"]
      interval: 10s      
      timeout: 5s        
      retries: 5         
      start_period: 30s  
    restart: unless-stopped
